<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>YouTube Player</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="barra_superior">
        <!--<div class="logo">YouTube<sup>BR</sup></div>-->
        <img class="icone_barra_superior" src="img/iconeYoutubeBarraSuperior.jpg" alt="icone_youtube_barra_superior">
        <div class="barra_pesquisar">
            <input type="text" placeholder="Pesquisar">
            <button>🔍</button>
        </div>
        <div class="perfil">⬆️ 🔔 👤</div>
    </header>

    <main class="conteudo">
        
        <section class="player">
            <div class="player_video">
                <div class="botao_play">▶</div>
            </div>
            
            <h1 class="titulo_video">Slow Summer Chill 🎶 Lo-Fi Hip Hop Beats</h1>
            
            <div class="informacao_canal">
                <div class="detalhe_canal">
                    <div class="avatar_canal"></div>
                    <div>
                        <strong>chilli music</strong><br>
                        <small>326 mil inscritos</small>
                    </div>
                    <button class="botao_inscrever">Inscrever-se</button>
                </div>
                <div class="acoes-video">
                    <button>👍 13</button>
                    <button>👎</button>
                    <button>Compartilhar</button>
                </div>
            </div>
        </section>

        <aside class="videos_recomendados">
            <div class="item-video">
                <div class="mini_thumb1"></div>
                <div class="mini_texto_thumb1">
                    <p class="mini_titulo">Chill Drive - Aesthetic Music</p>
                    <p class="mini_canal">chilli music</p>
                </div>
            </div>
            <div class="item-video">
                <div class="mini_thumb2"></div>
                <div class="mini_texto_thumb2">
                    <p class="mini_titulo">Calm Your Energy ✨ 420 Lo-Fi</p>
                    <p class="mini_canal">chilli music</p>
                </div>
            </div>
        </aside>

    </main>

</body>
</html>
